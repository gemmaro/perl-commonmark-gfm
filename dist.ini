name             = CommonMark::GFM
abstract         = Interface to the GitHub Flavored Markdown C library
version          = 0.310100
author           = Nick Wellnhofer <wellnhofer@aevum.de>
author           = gemmaro <gemmaro.dev@gmail.com>
license          = Perl_5
copyright_holder = Nick Wellnhofer
copyright_holder = gemmaro

[@Filter]
-bundle = @Basic
-remove = GatherDir
-remove = License
-remove = Readme
-remove = MakeMaker

[PodSyntaxTests]

[Prereqs]
perl = 5.008

[Prereqs / ConfigureRequires ]
Devel::CheckLib = 1.05

[Prereqs / TestRequires]
Test::More = 0
Encode = 0

[Prereqs / TestRecommends]
Test::LeakTrace = 0

[MetaJSON]

[MetaResources]
repository.url  = https://codeberg.org/gemmaro/perl-commonmark-gfm.git
repository.web  = https://codeberg.org/gemmaro/perl-commonmark
repository.type = git
bugtracker.web  = https://codeberg.org/gemmaro/perl-commonmark-gfm/issues

; See https://rt.cpan.org/Public/Bug/Display.html?id=92828
[GatherDir]
exclude_filename = Makefile.PL
exclude_filename = MANIFEST
exclude_filename = META.json
exclude_filename = META.yml

[CopyFilesFromBuild]
copy = Makefile.PL
copy = MANIFEST
copy = META.json
copy = META.yml

[MakeMaker::Awesome]
WriteMakefile_arg = LIBS => '-lcmark-gfm'
header = use Devel::CheckLib;
header = check_lib(
header =     header   => 'cmark-gfm.h',
header =     function => 'return CMARK_GFM_VERSION >= 0x1d0000 ? 0 : 1;',
header = ) or warn('libcmark-gfm 0.29.0 or higher not found'), exit;
